name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev python3-venv \
            zlib1g-dev libffi-dev libssl-dev libxml2-dev libxslt1-dev \
            libjpeg8-dev wget curl unzip zip autoconf automake libtool pkg-config
          pip3 install --upgrade pip wheel setuptools
          pip3 install --upgrade buildozer cython

      - name: Accept Android SDK licenses
        run: |
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk
          cd /home/runner/.buildozer/android/platform/android-sdk
          # 下载 cmdline-tools
          curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mkdir -p latest
          mv cmdline-tools/* latest/
          rm -f cmdline-tools.zip
          yes | latest/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk --licenses 2>&1 || true
          yes | latest/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" 2>&1 || true
          echo "SDK setup completed"

      - name: Build APK
        run: |
          cd mobiletran_apk
          export BUILDERSDK=/home/runner/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          buildozer android debug 2>&1 | tee build.log

      - name: Check if APK exists
        if: always()
        run: |
          echo "=== 检查 bin 目录 ==="
          ls -la mobiletran_apk/bin/ 2>&1 || echo "bin 目录不存在"
          echo "=== 查找 .apk 文件 ==="
          find mobiletran_apk -name "*.apk" 2>&1 || echo "没有找到 apk"
          echo "=== 列出 mobiletran_apk 目录 ==="
          ls -la mobiletran_apk/ 2>&1

      - name: Show build.log tail
        if: always()
        run: |
          if [ -f mobiletran_apk/build.log ]; then
            echo "=== build.log 最后 200 行 ==="
            tail -200 mobiletran_apk/build.log
            echo "=== build.log 错误行 ==="
            grep -i "error\|failed\|exception\|traceback" mobiletran_apk/build.log | head -50
          else
            echo "build.log 不存在"
          fi

      - name: Upload build.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: mobiletran_apk/build.log
          if-no-files-found: warn