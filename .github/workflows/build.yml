name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev python3-venv \
            zlib1g-dev libffi-dev libssl-dev libxml2-dev libxslt1-dev \
            libjpeg8-dev wget curl unzip zip autoconf automake libtool pkg-config
          pip3 install --upgrade pip wheel setuptools
          pip3 install --upgrade buildozer cython

      - name: Setup Android SDK
        run: |
          # GitHub Actions runner 已预装 Android SDK
          SDK_ROOT=/usr/local/lib/android/sdk
          echo "=== 预装 SDK 目录结构 ==="
          ls -la "$SDK_ROOT/"
          echo "=== build-tools ==="
          ls -la "$SDK_ROOT/build-tools/" 2>/dev/null || echo "无 build-tools"
          echo "=== platforms ==="
          ls -la "$SDK_ROOT/platforms/" 2>/dev/null || echo "无 platforms"
          echo "=== ndk ==="
          ls -la "$SDK_ROOT/ndk/" 2>/dev/null || echo "无 ndk"
          echo "=== cmdline-tools ==="
          ls -la "$SDK_ROOT/cmdline-tools/latest/bin/" 2>/dev/null || echo "无 cmdline-tools"
          # 创建 p4a/buildozer 期望的旧版 sdkmanager 路径
          # 新版 SDK 的 sdkmanager 在 cmdline-tools/latest/bin/，但 p4a 硬编码查找 tools/bin/sdkmanager
          mkdir -p "$SDK_ROOT/tools/bin"
          ln -sf "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$SDK_ROOT/tools/bin/sdkmanager"
          ln -sf "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$SDK_ROOT/tools/bin/avdmanager"
          echo "=== 已创建 tools/bin/sdkmanager 符号链接 ==="
          ls -la "$SDK_ROOT/tools/bin/"
          # 接受所有许可证
          yes | "$SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses 2>&1 || true
          yes | "$SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" 2>&1 || true
          echo "Android SDK setup completed"

      - name: Build APK
        run: |
          cd mobiletran_apk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          # 清理旧构建缓存（如有架构变更）
          rm -rf .buildozer
          buildozer android debug 2>&1 | tee build.log

      - name: Check if APK exists
        if: always()
        run: |
          echo "=== 检查 bin 目录 ==="
          ls -la mobiletran_apk/bin/ 2>&1 || echo "bin 目录不存在"
          echo "=== 查找 .apk 文件 ==="
          find mobiletran_apk -name "*.apk" 2>&1 || echo "没有找到 apk"
          echo "=== 列出 mobiletran_apk 目录 ==="
          ls -la mobiletran_apk/ 2>&1

      - name: Show build.log tail
        if: always()
        run: |
          if [ -f mobiletran_apk/build.log ]; then
            echo "=== build.log 最后 200 行 ==="
            tail -200 mobiletran_apk/build.log
            echo "=== build.log 错误行 ==="
            grep -i "error\|failed\|exception\|traceback" mobiletran_apk/build.log | head -50
          else
            echo "build.log 不存在"
          fi

      - name: Upload build.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: mobiletran_apk/build.log
          if-no-files-found: warn